<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="sgt-api-base" content="https://dole-embolism-trustless.ngrok-free.dev/api" />
  <script src="../assets/js/head-api.js?v=6"></script>

  <title>Settings — SGT Wallet</title>
  <link rel="icon" href="../assets/images/logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/dashboard.css" />
  <link rel="stylesheet" href="../assets/css/responsive.css" />
  <link rel="stylesheet" href="../assets/css/enhancements.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-container"></div>
    <main class="main-content">
      <header class="topbar">
        <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Menu">☰</button>
        <h2>Settings</h2>
        <div class="topbar-actions">
          <button class="theme-toggle" id="theme-toggle">🌗</button>
          <button class="btn btn-outline btn-sm" id="logout-btn">Logout</button>
        </div>
      </header>
      <div class="page-content settings-grid">
        <section class="glass settings-card">
          <h3>Profile Photo</h3>
          <div class="avatar-upload-wrap">
            <img id="avatar-preview" class="avatar-preview" src="../assets/images/logo.svg" alt="Your avatar" />
            <div class="avatar-upload-actions">
              <input type="file" id="avatar-input" accept="image/jpeg,image/png,image/gif,image/webp" hidden />
              <button type="button" class="btn btn-outline btn-sm" id="avatar-upload-btn" onclick="document.getElementById('avatar-input').click()">Change Photo</button>
              <p class="text-muted" style="font-size:0.8rem">JPG, PNG, GIF or WebP · max 5MB</p>
            </div>
          </div>
          <form id="profile-form">
            <div class="form-group">
              <label>Username</label>
              <input class="form-control" id="settings-username" name="username" required />
            </div>
            <div class="form-group">
              <label>Email</label>
              <input class="form-control" id="settings-email" disabled />
            </div>
            <div class="form-group">
              <label>Bio</label>
              <textarea class="form-control" id="settings-bio" name="bio" rows="3" placeholder="Short bio"></textarea>
            </div>
            <div class="form-group">
              <label>Wallet ID</label>
              <p id="settings-wallet" class="wallet-id">—</p>
            </div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
          </form>
        </section>
        <section class="glass settings-card">
          <h3>Appearance</h3>
          <p class="text-muted">Use the theme toggle in the header to switch Light, Dark, or AMOLED modes.</p>
          <p class="text-muted" style="margin-top:1rem">Themes are saved in localStorage.</p>
        </section>
      </div>
    </main>
  </div>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

  <script src="../assets/js/config.js?v=6"></script>
  <script src="../assets/js/notifications.js?v=6"></script>
  
  <script src="../assets/js/theme.js?v=6"></script>
  <script src="../assets/js/sgt-wallet.js?v=6"></script>
  <script src="../assets/js/settings.js?v=6"></script>
</body>
</html>
