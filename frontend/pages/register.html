<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="sgt-api-base" content="https://dole-embolism-trustless.ngrok-free.dev/api" />
  <script src="../assets/js/head-api.js?v=6"></script>

  <title>Register — SGT Wallet</title>
  <link rel="icon" href="../assets/images/logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/auth.css" />
  <link rel="stylesheet" href="../assets/css/responsive.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />
</head>
<body>
  <div class="auth-page">
    <div class="glass auth-card">
      <div class="auth-logo">
        <img src="../assets/images/logo.svg" alt="SGT" />
        <h1>SGT Wallet</h1>
      </div>
      <h2>Create account</h2>
      <p class="subtitle">Get 1,000 Gems signup bonus — simulation only</p>
      <form id="register-form">
        <div class="form-group">
          <label>Username</label>
          <input class="form-control" name="username" required minlength="3" pattern="[A-Za-z0-9]+" placeholder="sonicfan" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input class="form-control" name="email" type="email" required placeholder="you@email.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input class="form-control" name="password" type="password" minlength="8" required />
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input class="form-control" name="confirm" type="password" minlength="8" required />
        </div>
        <button type="submit" class="btn btn-primary glow-btn" style="width:100%">Create Account</button>
      </form>
      <p class="auth-footer">Have an account? <a href="login.html">Sign in</a></p>
      <p style="text-align:center;margin-top:1rem"><a href="../index.html">← Back to home</a></p>
    </div>
  </div>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

  <script src="../assets/js/config.js?v=6"></script>
  <script src="../assets/js/notifications.js?v=6"></script>
  
  <script src="../assets/js/sgt-wallet.js?v=6"></script>
  <script src="../assets/js/auth.js?v=6"></script>
</body>
</html>
