<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="sgt-api-base" content="https://dole-embolism-trustless.ngrok-free.dev/api" />
  <script src="../assets/js/head-api.js?v=6"></script>

  <title>Login — SGT Wallet</title>
  <link rel="icon" href="../assets/images/logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/auth.css" />
  <link rel="stylesheet" href="../assets/css/responsive.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />
</head>
<body>
  <div class="auth-page">
    <div class="glass auth-card">
      <div class="auth-logo">
        <img src="../assets/images/logo.svg" alt="SGT" />
        <h1>SGT Wallet</h1>
      </div>

      <div class="auth-tabs">
        <button type="button" class="auth-tab active" data-tab="login">Login</button>
        <button type="button" class="auth-tab" data-tab="verify">Verify</button>
        <button type="button" class="auth-tab" data-tab="reset">Reset</button>
      </div>

      <div id="panel-login" class="auth-panel">
        <h2>Welcome back</h2>
        <p class="subtitle">Sign in to your virtual wallet</p>
        <form id="login-form">
          <div class="form-group">
            <label for="email">Email</label>
            <input class="form-control" type="email" id="email" name="email" required placeholder="you@email.com" />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input class="form-control" type="password" id="password" name="password" required placeholder="••••••••" />
          </div>
          <button type="submit" class="btn btn-primary glow-btn" style="width:100%">Sign In</button>
        </form>
        <p class="auth-footer">No account? <a href="register.html">Register</a></p>
      </div>

      <div id="panel-verify" class="auth-panel hidden">
        <h2>Verify Email</h2>
        <p class="subtitle">Paste your token or open the link from your email.</p>
        <form id="verify-form">
          <div class="form-group">
            <label>Verification Token</label>
            <input class="form-control" id="verify-token" name="token" required placeholder="Paste token from email" />
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%">Verify Email</button>
        </form>
        <hr class="auth-divider" />
        <form id="resend-verify-form">
          <div class="form-group">
            <label>Resend verification</label>
            <input class="form-control" name="email" type="email" required placeholder="you@email.com" />
          </div>
          <button type="submit" class="btn btn-outline" style="width:100%">Resend Email</button>
        </form>
      </div>

      <div id="panel-reset" class="auth-panel hidden">
        <h2>Reset Password</h2>
        <form id="request-reset-form" style="margin-bottom:1.5rem">
          <div class="form-group">
            <label>Email</label>
            <input class="form-control" name="email" type="email" required placeholder="you@email.com" />
          </div>
          <button type="submit" class="btn btn-outline" style="width:100%">Send Reset Link</button>
        </form>
        <form id="reset-form">
          <div class="form-group">
            <label>Reset Token</label>
            <input class="form-control" id="reset-token" name="token" required />
          </div>
          <div class="form-group">
            <label>New Password</label>
            <input class="form-control" name="password" type="password" minlength="8" required />
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <input class="form-control" name="confirm" type="password" minlength="8" required />
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%">Reset Password</button>
        </form>
      </div>

      <p style="text-align:center;margin-top:1rem"><a href="../index.html">← Back to home</a></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
  <script src="../assets/js/config.js?v=6"></script>
  <script src="../assets/js/notifications.js?v=6"></script>
  <script src="../assets/js/sgt-wallet.js?v=6"></script>
  <script src="../assets/js/auth.js?v=6"></script>
</body>
</html>
