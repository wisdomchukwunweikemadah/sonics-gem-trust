<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="sgt-api-base" content="https://dole-embolism-trustless.ngrok-free.dev/api" />
  <script src="../assets/js/head-api.js?v=6"></script>

  <title>Admin — SGT Wallet</title>
  <link rel="icon" href="../assets/images/logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/dashboard.css" />
  <link rel="stylesheet" href="../assets/css/responsive.css" />
  <link rel="stylesheet" href="../assets/css/enhancements.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-container"></div>
    <main class="main-content">
      <header class="topbar">
        <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Menu">☰</button>
        <h2>Admin Dashboard</h2>
        <div class="topbar-actions">
          <button class="theme-toggle" id="theme-toggle">🌗</button>
          <button class="btn btn-outline btn-sm" id="logout-btn">Logout</button>
        </div>
      </header>
      <div class="page-content">
        <div class="dashboard-grid">
          <div class="glass stat-card"><p class="label">Users</p><p class="value" id="stat-users">0</p></div>
          <div class="glass stat-card"><p class="label">Transactions</p><p class="value" id="stat-tx">0</p></div>
          <div class="glass stat-card"><p class="label">Total Gems</p><p class="value" id="stat-gems">0</p></div>
          <div class="glass stat-card"><p class="label">Total USSD</p><p class="value" id="stat-ussd">0</p></div>
        </div>

        <section class="glass admin-section">
          <h3>Gift Gems</h3>
          <p class="text-muted section-desc">Send Gems to any user — balance updates instantly with transaction history.</p>
          <form id="gift-form" class="admin-form-grid">
            <select class="form-control" name="walletId" id="gift-wallet-select" required>
              <option value="">Select recipient</option>
            </select>
            <input class="form-control" name="amount" type="number" min="0.01" step="0.01" placeholder="Gems to gift" required />
            <input class="form-control" name="description" placeholder="Note (optional)" />
            <button type="submit" class="btn btn-primary">Gift Gems</button>
          </form>
        </section>

        <section class="glass admin-section">
          <h3>Set Absolute Balance</h3>
          <p class="text-muted section-desc">Override a user's exact Gem or USSD balance.</p>
          <form id="balance-form" class="admin-form-grid">
            <select class="form-control" name="userId" id="balance-user-select" required>
              <option value="">Select user</option>
            </select>
            <input class="form-control" name="gemBalance" type="number" step="0.01" min="0" placeholder="New Gems total" />
            <input class="form-control" name="ussdBalance" type="number" step="0.01" min="0" placeholder="New USSD total" />
            <button type="submit" class="btn btn-outline">Update Balance</button>
          </form>
        </section>

        <section class="glass admin-section">
          <h3>Search Users</h3>
          <input class="form-control" id="user-search" placeholder="Search by name, email, or wallet ID" />
        </section>

        <section class="glass admin-section">
          <h3>Recent Activity</h3>
          <div id="admin-activity" class="activity-feed"></div>
        </section>

        <section class="glass admin-section table-section">
          <h3>All Users</h3>
          <table class="admin-table">
            <thead><tr><th>User</th><th>Email</th><th>Wallet</th><th>Gems</th><th>USSD</th><th>Role</th></tr></thead>
            <tbody id="users-table"></tbody>
          </table>
        </section>
      </div>
    </main>
  </div>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

  <script src="../assets/js/config.js?v=6"></script>
  <script src="../assets/js/notifications.js?v=6"></script>
  
  <script src="../assets/js/theme.js?v=6"></script>
  <script src="../assets/js/sgt-wallet.js?v=6"></script>
  <script src="../assets/js/admin.js?v=6"></script>
</body>
</html>
